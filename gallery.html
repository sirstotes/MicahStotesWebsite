    <script>
        let currentPhotos;
        let currentImg = 0;
        function loadGallery(photos, id) {
            let year = photos[0].year;
            let gallery = $("<div class='gallery'></div>");
            for(let i = 0; i < photos.length; i ++) {
                let newImg = $("<div style='background-image:url(\""+photos[i].thumbnail+"\");'></div>");
                newImg.on("click", function(event) {
                    event.stopPropagation();
                    showImage(photos, i);
                });
                if(photos[i].year != year) {
                    $(id).append("<div class='gallery_divider'><div></div><h3>"+year+"</h3><div></div></div>");
                    $(id).append(gallery);
                    year = photos[i].year;
                    gallery = $("<div class='gallery'></div>");
                }
                gallery.append(newImg);
            }
            $(id).append("<div class='gallery_divider'><div></div><h3>"+year+"</h3><div></div></div>");
            $(id).append(gallery);
            gallery = $("<div class='gallery'></div>");
        }
        function showDisplay() {
            $(".image_display").show();
        }
        function hideDisplay() {
            $(".image_display").hide();
        }
        function nextImage() {
            currentImg ++;
            if(currentImg >= currentPhotos.length) {
                currentImg = 0;
            }
            updateDisplay();
        }
        function prevImage() {
            currentImg --;
            if(currentImg < 0) {
                currentImg = currentPhotos.length - 1;
            }
            updateDisplay();
        }
        function updateDisplay() {
            $("#image_display_img").css("background-image", "url('"+currentPhotos[currentImg].url+"')");
            $("#image_display_caption").html(currentPhotos[currentImg].caption);
        }
        function showImage(photos, num) {
            currentPhotos = photos;
            currentImg = num;
            updateDisplay();
            showDisplay();
        }
